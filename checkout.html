<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Toko Hikmah</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/logo.png" alt="Logo Toko Hikmah" class="nav-logo" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=150&auto=format&fit=crop'">
                    <h2>Toko Hikmah <span class="checkout-title">| Checkout</span></h2>
                </a>
            </div>
        </div>
    </header>

    <div class="checkout-wrapper">
        <div class="checkout-container">
            <div class="checkout-header">
                <h2><i class="fas fa-map-marker-alt"></i> Alamat Pengiriman</h2>
            </div>
            
            <form id="checkoutForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama penerima..." required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Nomor HP</label>
                    <input type="tel" id="hp" placeholder="Contoh: 085342288850" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-home"></i> Alamat Lengkap</label>
                    <textarea id="alamat" rows="4" placeholder="Nama Jalan, Gedung, No. Rumah, RT/RW, Kecamatan..." required></textarea>
                </div>

                <button type="submit" class="btn-pesan">
                    Buat Pesanan <i class="fas fa-chevron-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("checkoutForm").addEventListener("submit", function(e){
            e.preventDefault();

            let nama = document.getElementById("nama").value;
            let hp = document.getElementById("hp").value;
            let alamat = document.getElementById("alamat").value;

            // Simpan data diri ke localStorage
            localStorage.setItem("nama", nama);
            localStorage.setItem("hp", hp);
            localStorage.setItem("alamat", alamat);

            // Arahkan ke halaman struk
            window.location.href="struk.html";
        });
    </script>

</body>
</html>
