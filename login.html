<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Toko Hikmah</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/logo.png" alt="Logo Toko Hikmah" class="nav-logo" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=150&auto=format&fit=crop'">
                    <h2>Toko Hikmah</h2>
                </a>
            </div>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <i class="fas fa-user-shield auth-icon"></i>
                <h2>Login Admin</h2>
                <p>Silakan masuk untuk mengelola pesanan</p>
            </div>

            <form id="loginForm">
                <div id="errorMsg" class="error-msg" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i> Username atau Password salah!
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Masukkan username..." required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Masukkan password..." required>
                </div>

                <button type="submit" class="btn-pesan">
                    Masuk <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <div class="back-home">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
            </div>
        </div>
    </div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let errorMsg = document.getElementById("errorMsg");

    if(username === "admin" && password === "12345"){
        localStorage.setItem("adminLogin", "true");
        window.location.href = "admin.html";
    } else {
        // Menampilkan pesan error di dalam form
        errorMsg.style.display = "block";
        
        // Menghilangkan pesan error otomatis setelah 3 detik
        setTimeout(() => {
            errorMsg.style.display = "none";
        }, 3000);
    }
});
</script>

</body>
</html>
